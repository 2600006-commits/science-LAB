<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>과학실 재고 관리</title>
<link rel="stylesheet" href="css/style.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div id="app">

  <!-- 사이드바 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><span class="dot"></span>과학실 재고 관리</div>
    <nav class="nav-group" id="nav-group">
      <button class="nav-item" data-view="lab" onclick="setView('lab')"><span class="icon">🧪</span>LAB 관리</button>
      <button class="nav-item" data-view="inventory" onclick="setView('inventory')"><span class="icon">📦</span>재고관리</button>
      <button class="nav-item" data-view="purchase" onclick="setView('purchase')"><span class="icon">🧾</span>구매관리</button>
      <button class="nav-item" data-view="signup" onclick="openSignupModal()"><span class="icon">👤</span>회원가입</button>
    </nav>
    <div class="sidebar-footer">© 과학실 재고 관리 시스템</div>
  </aside>

  <!-- 메인 -->
  <div class="main">
    <header class="topbar">
      <div class="flex gap-8">
        <button class="btn btn-ghost" id="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')" style="display:none;">☰</button>
        <div class="topbar-title" id="topbar-title">LAB 관리</div>
      </div>
      <div class="topbar-right" id="topbar-right">
        <!-- 로그인 상태에 따라 JS로 렌더링 -->
      </div>
    </header>
    <main class="content" id="content"></main>
  </div>
</div>

<div id="modal-host"></div>
<div id="toast-host"></div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
